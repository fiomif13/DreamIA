<header class="navbar">
  <button class="logo-btn" (click)="openLeft()">
    Dream IA
  </button>

  <button class="publish-btn" (click)="openRight()">
    Publicar
  </button>
</header>

<div class="sidebars-container">

  <!-- SIDEBAR IA -->
<!-- SIDEBAR IA -->
<div class="sidebar-left" [class.open]="leftOpen">

  <button class="close-btn-left" (click)="closeLeft()">
    ❮
  </button>

  <h2>Dream IA</h2>

  <div class="ia-container">

    <!-- MENSAJES -->
    <div class="messages">

      <div *ngFor="let msg of messages">

        <!-- MENSAJE USUARIO -->
        <div
          class="user-message"
          *ngIf="msg.type === 'user'"
        >
          {{ msg.text }}
        </div>

        <!-- RESPUESTA IA -->
        <div
          class="ia-message"
          *ngIf="msg.type === 'ia'"
        >

          <h3>Inicios</h3>

          <div
            class="option"
            *ngFor="let item of msg.data.inicios"
          >
            {{ item }}
          </div>

          <h3>Desarrollos</h3>

          <div
            class="option"
            *ngFor="let item of msg.data.desarrollos"
          >
            {{ item }}
          </div>

          <h3>Finales</h3>

          <div
            class="option"
            *ngFor="let item of msg.data.finales"
          >
            {{ item }}
          </div>

        </div>

      </div>

    </div>

    <!-- INPUT -->
    <div class="input-area">

      <input
        type="text"
        [(ngModel)]="dream"
        placeholder="Describe tu sueño..."
        (keyup.enter)="generarOpciones()"
      />

      <button (click)="generarOpciones()">
        ➤
      </button>

    </div>

  </div>

</div>

  <!-- SIDEBAR PUBLICAR -->
  <div class="sidebar-right" [class.open]="rightOpen">

    <button class="close-btn-right" (click)="closeRight()">
      ❯
    </button>

    <h2>Publicar</h2>

    <div class="form">

      <input
        type="text"
        placeholder="Autor"
        [value]="author"
        (input)="author = $any($event.target).value"
      >

      <input
        type="text"
        placeholder="Título"
        [value]="title"
        (input)="title = $any($event.target).value"
      >

      <textarea
        placeholder="Contenido"
        [value]="content"
        (input)="content = $any($event.target).value"
      ></textarea>

      <p class="error-msg" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <button
        class="publish-story-btn"
        type="button"
        (click)="publish()"
      >
        Publicar
      </button>

    </div>

  </div>

</div>

<app-feed></app-feed>
